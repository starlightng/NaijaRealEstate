version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: naija_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: naijaproperty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./realestate-api
      dockerfile: Dockerfile
    container_name: naija_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/naijaproperty
      SECRET_KEY: a_very_secure_random_secret_key_12345
      ALLOWED_ORIGINS: '["http://localhost:3001", "http://127.0.0.1:3001"]'
      DEBUG: "true"
    volumes:
      - uploads_data:/app/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./realestate-frontend
      dockerfile: Dockerfile
    container_name: naija_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      # IMPORTANT: Use backend service name, not localhost
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  pgdata:
  uploads_data:
